name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t devsecops-pipeline .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "devsecops-pipeline:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Static analysis with Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python p/owasp-top-ten

      - name: Start Flask app for DAST
        run: |
          python app.py &
          sleep 5

      - name: Run OWASP ZAP DAST
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          allow_issue_filing: false

      - name: Send Discord alert
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🔐 Pipeline run complete! ZAP DAST scan finished for commit ${{ github.sha }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}